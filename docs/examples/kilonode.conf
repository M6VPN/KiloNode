# KiloNode - Developed by M6VPN (M6VPN@tuta.com)
# kilonode/docs/examples/kilonode.conf

node {
	callsign M6VPN-1
	alias KILON
	location "Test node"
}

port kiss0 {
	type tcp-listen
	host 127.0.0.1
	port 8001
	max-frame 2048
	enabled true
}

port serial0 {
	type serial
	device /dev/ttyUSB0
	baud 9600
	flow-control off
	max-frame 2048
	enabled false
}

port pty0 {
	type pty
	max-frame 2048
	enabled false
}

port unix0 {
	type unix-listen
	path /tmp/kilonode/kiss.sock
	max-frame 2048
	enabled false
}

port tcp0 {
	type tcp-connect
	host 127.0.0.1
	port 8001
	max-frame 2048
	enabled false
}
