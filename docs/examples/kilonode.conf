# KiloNode - Developed by M6VPN (M6VPN@tuta.com)
# kilonode/docs/examples/kilonode.conf

node {
	callsign M6VPN-1
	alias KILON
	location "Test node"
}

control {
	enabled true
	path /tmp/kilonode/control.sock
}

heard {
	enabled true
	max-entries 256
}

receive {
	events-enabled true
	max-events 256
	max-sessions 128
	payload-preview-bytes 80
}

transmit {
	enabled false
	dry-run true
	max-queued 128
	max-payload-bytes 256
	payload-preview-bytes 80
	allow-ui false
	allow-control-enqueue false
	allow-shell-enqueue false
	dispatch-enabled false
	dispatch-test-only true
	dispatch-max-per-cycle 4
}

access {
	default-policy allow
	allow-localhost true
	max-line-bytes 512
	max-command-bytes 512
	max-clients 8
	idle-timeout-seconds 900
	input-rate-lines 30
	input-rate-window-seconds 60
	bbs-max-body-bytes 65536
	control-max-command-bytes 512
	control-max-response-lines 200
}

shell {
	enabled true
	host 127.0.0.1
	port 8010
	max-clients 4
	banner "KiloNode test shell"
}

bbs {
	enabled true
	store-path ./var/messages
	# users/ and read/ are stored below store-path
	max-body-bytes 65536
}

port kiss0 {
	type tcp-listen
	host 127.0.0.1
	port 8001
	max-frame 2048
	enabled true
}

port serial0 {
	type serial
	device /dev/ttyUSB0
	baud 9600
	flow-control off
	max-frame 2048
	enabled false
}

port pty0 {
	type pty
	max-frame 2048
	enabled false
}

port unix0 {
	type unix-listen
	path /tmp/kilonode/kiss.sock
	max-frame 2048
	enabled false
}

port tcp0 {
	type tcp-connect
	host 127.0.0.1
	port 8001
	max-frame 2048
	enabled false
}
