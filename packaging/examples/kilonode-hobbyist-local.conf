# KiloNode - Developed by M6VPN (M6VPN@tuta.com)
# kilonode/packaging/examples/kilonode-hobbyist-local.conf

node {
	callsign M6VPN-1
	alias KILON
	location "Hobbyist local preview"
}

control {
	enabled true
	path /tmp/kilonode/control.sock
}

heard {
	enabled true
	max-entries 256
}

receive {
	events-enabled true
	max-events 256
	max-sessions 128
	payload-preview-bytes 80
}

ax25 {
	enabled false
	connected-mode false
	diagnostics true
	live-rx-feed false
	live-rx-create-connections false
	live-rx-retain-frame-plans true
	live-scheduler false
	live-scheduler-process-expired false
	live-scheduler-smoke false
	live-scheduler-smoke-create-test-connection false
	live-scheduler-max-expired-per-cycle 4
	live-scheduler-tx-actions false
	prepared-frames true
	prepared-max-frames 128
	prepared-build-raw true
	prepared-bridge-to-tx false
	max-connections 32
	modulo 8
	window-size 1
	t1-ms 3000
	t2-ms 1000
	t3-ms 300000
	n2-retries 10
}

rf-command {
	enabled false
	reply-enabled false
	max-events 128
	max-command-bytes 128
	max-reply-bytes 200
	accept-destinations NODE,CQ
	require-node-destination true
	rate-limit-enabled true
	rate-limit-commands 6
	rate-limit-window-seconds 60
	reply-rate-limit-commands 3
	reply-rate-limit-window-seconds 60
	auto-ignore-enabled false
	auto-ignore-after-rejects 10
	auto-ignore-seconds 900
	ignore-list-path ./var/rf-ignore.txt
}

transmit {
	enabled false
	dry-run true
	max-queued 128
	max-payload-bytes 256
	payload-preview-bytes 80
	allow-ui false
	allow-control-enqueue false
	allow-shell-enqueue false
	dispatch-enabled false
	dispatch-test-only true
	dispatch-real-kiss false
	dispatch-max-per-cycle 4
	require-explicit-port-tx true
}

access {
	default-policy allow
	allow-localhost true
	max-line-bytes 512
	max-command-bytes 512
	max-clients 8
	idle-timeout-seconds 900
	input-rate-lines 30
	input-rate-window-seconds 60
	bbs-max-body-bytes 65536
	control-max-command-bytes 512
	control-max-response-lines 200
}

shell {
	enabled true
	host 127.0.0.1
	port 8010
	max-clients 4
	banner "KiloNode hobbyist local shell"
}

bbs {
	enabled true
	store-path ./var/messages
	max-body-bytes 65536
}

port kiss0 {
	type tcp-listen
	host 127.0.0.1
	port 8001
	max-frame 2048
	enabled true
	tx-enabled false
}
