# KiloNode - Developed by M6VPN (M6VPN@tuta.com)
# kilonode/packaging/examples/kilonode-external-modem-status.conf

# Status-only external modem example. This does not start modem processes,
# connect sockets, enable CONNECT, or enable transmit.

node {
	callsign M6VPN-1
	alias KILON
	location "External modem status preview"
}

control {
	enabled true
	path /tmp/kilonode/control.sock
}

heard {
	enabled true
	max-entries 256
}

receive {
	events-enabled true
	max-events 256
	max-sessions 128
	payload-preview-bytes 80
}

transmit {
	enabled false
	dry-run true
	max-queued 128
	max-payload-bytes 256
	payload-preview-bytes 80
	allow-ui false
	allow-control-enqueue false
	allow-shell-enqueue false
	dispatch-enabled false
	dispatch-test-only true
	dispatch-real-kiss false
	dispatch-max-per-cycle 4
	require-explicit-port-tx true
}

access {
	default-policy allow
	allow-localhost true
	max-line-bytes 512
	max-command-bytes 512
	max-clients 4
	idle-timeout-seconds 900
	input-rate-lines 30
	input-rate-window-seconds 60
	bbs-max-body-bytes 65536
	control-max-command-bytes 512
	control-max-response-lines 200
}

external-modem mercury0 {
	enabled false
	type mercury-ofdm
	mode status-only
	host 127.0.0.1
	port 0
	auto-start false
	tx-enabled false
	connect-enabled false
	notes "Mercury OFDM planned external adapter"
}

external-modem direwolf0 {
	enabled false
	type kiss-tcp
	mode receive-only
	host 127.0.0.1
	port 8001
	auto-start false
	tx-enabled false
	connect-enabled false
	notes "Dire Wolf TCP KISS receive-only path"
}
