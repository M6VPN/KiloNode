# KiloNode - Developed by M6VPN (M6VPN@tuta.com)
# kilonode/packaging/examples/kilonode-tx-test-only.conf

# Test-only TX dispatch harness. This config uses a memory-test port and does
# not write to real TNC hardware, sockets, PTYs, serial devices, or stdio.

node {
	callsign M6VPN-1
	alias KILON
	location "TX dispatch test harness"
}

control {
	enabled true
	path /tmp/kilonode/control.sock
}

heard {
	enabled false
	max-entries 256
}

receive {
	events-enabled true
	max-events 256
	max-sessions 128
	payload-preview-bytes 80
}

transmit {
	enabled true
	dry-run true
	max-queued 128
	max-payload-bytes 256
	payload-preview-bytes 80
	allow-ui true
	allow-control-enqueue true
	allow-shell-enqueue false
	dispatch-enabled true
	dispatch-test-only true
	dispatch-real-kiss false
	dispatch-max-per-cycle 4
	require-explicit-port-tx true
}

access {
	default-policy allow
	allow-localhost true
	max-line-bytes 512
	max-command-bytes 512
	max-clients 4
	idle-timeout-seconds 900
	input-rate-lines 30
	input-rate-window-seconds 60
	bbs-max-body-bytes 65536
	control-max-command-bytes 512
	control-max-response-lines 200
}

shell {
	enabled false
	host 127.0.0.1
	port 8010
	max-clients 2
	banner "KiloNode local shell"
}

bbs {
	enabled false
	store-path ./var/messages
	max-body-bytes 65536
}

port mem0 {
	type memory-test
	enabled true
	tx-enabled false
	max-frame 330
}
