# KiloNode - Developed by M6VPN (M6VPN@tuta.com)
# kilonode/packaging/examples/kilonode-tx-lab-only.conf

# Lab-only TX safety gate example.
# This file parses in a non-transmitting state by default.
# It may write KISS frames to a configured transport only after explicit edits.
# Do not connect to a radio unless licensed, configured, and ready.
# Use a dummy load or non-radiating test setup where appropriate.

node {
	callsign M6VPN-1
	alias KILON
	location "TX lab safety gate example"
}

control {
	enabled true
	path /tmp/kilonode/control.sock
}

heard {
	enabled true
	max-entries 256
}

receive {
	events-enabled true
	max-events 256
	max-sessions 128
	payload-preview-bytes 80
}

# Set enabled and reply-enabled true only for controlled RF command tests.
# Replies are queued and are not automatically dispatched.
rf-command {
	enabled false
	reply-enabled false
	max-events 128
	max-command-bytes 128
	max-reply-bytes 200
	accept-destinations NODE,CQ
	require-node-destination true
}

transmit {
	enabled true
	dry-run true
	max-queued 128
	max-payload-bytes 256
	payload-preview-bytes 80
	allow-ui true
	allow-control-enqueue true
	allow-shell-enqueue false
	dispatch-enabled true
	dispatch-test-only false
	dispatch-real-kiss true
	dispatch-max-per-cycle 4
	require-explicit-port-tx true
}

access {
	default-policy allow
	allow-localhost true
	max-line-bytes 512
	max-command-bytes 512
	max-clients 4
	idle-timeout-seconds 900
	input-rate-lines 30
	input-rate-window-seconds 60
	bbs-max-body-bytes 65536
	control-max-command-bytes 512
	control-max-response-lines 200
}

shell {
	enabled false
	host 127.0.0.1
	port 8010
	max-clients 2
	banner "KiloNode lab shell"
}

bbs {
	enabled false
	store-path ./var/messages
	max-body-bytes 65536
}

port kiss0 {
	type tcp-connect
	host 127.0.0.1
	port 8001
	max-frame 2048
	enabled true
	tx-enabled false
}
