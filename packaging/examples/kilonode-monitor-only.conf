# KiloNode - Developed by M6VPN (M6VPN@tuta.com)
# kilonode/packaging/examples/kilonode-monitor-only.conf

node {
	callsign M6VPN-1
	alias KILON
	location "Monitor-only local node"
}

control {
	enabled true
	path /tmp/kilonode/control.sock
}

heard {
	enabled true
	max-entries 256
}

receive {
	events-enabled true
	max-events 256
	max-sessions 128
	payload-preview-bytes 80
}

transmit {
	enabled false
	dry-run true
	max-queued 128
	max-payload-bytes 256
	payload-preview-bytes 80
	allow-ui false
}

access {
	default-policy allow
	allow-localhost true
	max-line-bytes 512
	max-command-bytes 512
	max-clients 4
	idle-timeout-seconds 900
	input-rate-lines 30
	input-rate-window-seconds 60
	bbs-max-body-bytes 65536
	control-max-command-bytes 512
	control-max-response-lines 200
}

shell {
	enabled false
	host 127.0.0.1
	port 8010
	max-clients 2
	banner "KiloNode monitor shell"
}

bbs {
	enabled false
	store-path ./var/messages
	max-body-bytes 65536
}

port kiss0 {
	type tcp-listen
	host 127.0.0.1
	port 8001
	max-frame 2048
	enabled true
}
